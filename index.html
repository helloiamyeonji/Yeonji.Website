<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="Kim Yeonji's personal homepage."
    />
    <meta name="keywords" content="kim yeonji, personal homepage" />
    <meta name="author" content="Kim Yeonji" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kim yeonji</title>
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/fontawesome.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/brands.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/solid.min.css"
    />
  </head>
  <body>
    <main class="section" aria-label="kim yeonji homepage">
      <header class="header">
        <h1 class="logo" aria-label="kim yeonji">
          <span class="logo-text">k<span class="accent">i</span>m</span>
          <span class="logo-text">yeonj<span class="accent">i</span></span>
        </h1>
      </header>

      <footer>
        <ul class="footer" aria-label="social links">
          <li>
            <a href="#" title="GitHub" aria-label="GitHub" class="github">
              <i class="fa-brands fa-github" aria-hidden="true"></i>
            </a>
          </li>
          <li>
            <a href="#" title="Weibo" aria-label="Weibo" class="weibo">
              <i class="fa-brands fa-weibo" aria-hidden="true"></i>
            </a>
          </li>
          <li>
            <a href="#" title="X - Twitter" aria-label="Twitter" class="twitter">
              <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
            </a>
          </li>
          <li>
            <a href="#" title="LinkedIn" aria-label="LinkedIn" class="linked-in">
              <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
            </a>
          </li>
          <li>
            <a href="#" title="Instagram" aria-label="Instagram" class="instagram">
              <i class="fa-brands fa-instagram" aria-hidden="true"></i>
            </a>
          </li>
          <li>
            <a href="#" title="Unsplash" aria-label="Unsplash" class="unsplash">
              <i class="fa-brands fa-unsplash" aria-hidden="true"></i>
            </a>
          </li>
          <li>
            <a href="#" title="Email" aria-label="Email" class="email">
              <i class="fa-solid fa-envelope" aria-hidden="true"></i>
            </a>
          </li>
        </ul>
      </footer>

      <div class="capybara-lane" aria-hidden="true">
        <div class="capybara">
          <svg viewBox="0 0 210 110" role="img">
            <title>Walking capybara</title>
            <ellipse
              class="shadow"
              cx="101"
              cy="97"
              rx="72"
              ry="8"
            />
            <g class="body-bob">
              <path
                class="body"
                d="M39 67c3-28 29-48 69-48 34 0 66 18 72 45 3 13-3 25-18 30-15 6-47 7-77 4-31-3-50-12-46-31Z"
              />
              <path
                class="head"
                d="M139 40c12-10 34-8 43 3 9 12 8 33-3 41-10 8-31 7-43-1-12-8-10-33 3-43Z"
              />
              <path
                class="muzzle"
                d="M165 60c10-2 19 1 22 8 3 8-5 14-16 14-9 0-17-4-18-10-1-6 4-10 12-12Z"
              />
              <circle class="eye" cx="159" cy="51" r="3.4" />
              <path class="ear" d="M145 36c-1-11 11-14 16-4 2 7-5 12-16 4Z" />
              <path class="nose" d="M181 66c5 0 7 4 4 7-3 3-9 2-11-2-1-3 2-5 7-5Z" />
              <g class="leg leg-front">
                <path d="M137 83c8 1 13 7 12 17h-11c0-5-2-8-6-11Z" />
              </g>
              <g class="leg leg-front-alt">
                <path d="M156 83c9 1 15 6 16 16h-11c-2-5-5-8-10-10Z" />
              </g>
              <g class="leg leg-back">
                <path d="M62 82c9 2 13 8 12 18H62c1-6-2-9-7-12Z" />
              </g>
              <g class="leg leg-back-alt">
                <path d="M87 84c9 0 15 6 16 16H91c-1-5-4-8-10-10Z" />
              </g>
              <path
                class="highlight"
                d="M56 55c19-23 69-28 96-7"
              />
            </g>
          </svg>
        </div>
      </div>

      <p class="see-more">
        Scroll down to get to know me <span aria-hidden="true">↓</span>
      </p>
    </main>
  </body>
</html>
