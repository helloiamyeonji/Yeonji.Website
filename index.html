<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Kim Yeonji's personal homepage." />
    <meta name="keywords" content="Kim Yeonji, personal homepage" />
    <meta name="author" content="Kim Yeonji" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kim Yeonji</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/fontawesome.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/brands.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/solid.min.css"
    />
  </head>
  <body>
    <main class="section" aria-label="Kim Yeonji homepage">
      <header class="header">
        <h1 class="logo" aria-label="Kim Yeonji">
          <span class="logo-text">K<span class="accent">i</span>m</span>
          <span class="logo-text">Yeonj<span class="accent">i</span></span>
        </h1>
      </header>

      <footer>
        <ul class="footer" aria-label="social links">
          <li>
            <a
              href="https://github.com/helloiamyeonji"
              title="GitHub"
              aria-label="GitHub"
              class="github"
            >
              <i class="fa-brands fa-github" aria-hidden="true"></i>
            </a>
          </li>
          <li>
            <a href="#" title="LinkedIn" aria-label="LinkedIn" class="linked-in">
              <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
            </a>
          </li>
          <li>
            <a href="#" title="Email" aria-label="Email" class="email">
              <i class="fa-solid fa-envelope" aria-hidden="true"></i>
            </a>
          </li>
        </ul>
      </footer>

      <div class="capybara-lane">
        <div
          class="capybara"
          id="capybara"
          role="button"
          aria-label="Drag the capybara"
          tabindex="0"
        >
          <div class="cry-bubble" aria-hidden="true">놔줘...</div>
          <img class="capybara-image" src="./assets/capybara.svg" alt="" />
        </div>
      </div>

      <p class="see-more">
        Scroll down to get to know me <span aria-hidden="true">↓</span>
      </p>
    </main>

    <section class="hometown-section" id="hometown" aria-label="Hometown">
      <div class="hometown-sticky">
        <h2 class="hometown-title">Hometown</h2>
        <div class="hometown-story">
          <p>
            저는 부산에서 태어났어요. 바다 가까운 도시에서 자라서, 파도
            소리와 짭짤한 공기가 아직도 제 고향을 떠올리게 해요.
          </p>
          <img
            class="ocean-gif"
            src="./assets/ocean-waves.gif"
            alt="Animated ocean waves"
          />
        </div>
      </div>
    </section>
  </body>
</html>
